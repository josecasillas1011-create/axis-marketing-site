# Netlify config for the Axis Marketing public site (static, no build step).
# This repo's root IS the site root (index.html + the other .html pages live here).
# Netlify automatically serves 404.html for unknown paths.

[build]
  publish = "."
  command = ""

# 301s from the old page filenames (with spaces) to the new clean URLs.
# Paths with spaces must be URL-encoded (%20) in redirect rules.
[[redirects]]
  from = "/FAQ.html"
  to = "/faq.html"
  status = 301

[[redirects]]
  from = "/Free%20Tools.html"
  to = "/tools.html"
  status = 301

[[redirects]]
  from = "/Privacy%20Policy.html"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/Terms%20of%20Service.html"
  to = "/terms.html"
  status = 301

[[redirects]]
  from = "/Landing%20Page.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/frontdesk"
  to = "/frontdesk.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
