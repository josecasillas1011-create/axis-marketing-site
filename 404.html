<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — Axis Marketing</title>
  <link rel="icon" type="image/png" href="assets/axis-icon-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { align-items: center; display: flex; flex-direction: column; justify-content: center; padding: 24px; text-align: center; }
    .mark { height: 64px; margin-bottom: 32px; opacity: 0.18; width: 64px; }
    .code {
      font-family: var(--font-head);
      font-size: clamp(80px, 18vw, 140px); font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--gold-pale), var(--gold));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-size: clamp(20px, 4vw, 30px); margin-bottom: 12px; }
    body > p { color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 36px; max-width: 400px; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .page-footer { bottom: 24px; color: var(--muted); font-size: 12px; position: fixed; }
    .page-footer a { color: var(--muted); }
    .page-footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <img src="assets/axis-icon-logo-white.png" alt="" aria-hidden="true" class="mark" />
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

  <div class="actions">
    <a href="/" class="btn-primary">← Back to Home</a>
    <a href="/#contact" class="btn-ghost">Book a Strategy Call</a>
  </div>

  <div class="page-footer">
    <p>© 2026 Axis Marketing &nbsp;·&nbsp; <a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a></p>
  </div>

</body>
</html>
